name: notes
description: "365Notes - A simple, fast, and clean offline notes application"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.2
  path: ^1.9.0
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  share_plus: ^9.0.0
  file_picker: ^8.0.6
  path_provider: ^2.1.3
  intl: ^0.19.0
  flutter_staggered_grid_view: ^0.7.0
  package_info_plus: ^8.0.0
  sqflite_common_ffi: ^2.3.5

flutter:
  uses-material-design: true
  assets:
    - Assets/
